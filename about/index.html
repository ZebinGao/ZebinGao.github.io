<script>window.poemData = [{"title":"唐多令 · 芦叶满汀州","meta":"[宋] 刘过","verses":[["芦叶满汀洲，寒沙带浅流。","二十年重过南楼。","柳下系船犹未稳，能几日，又中秋。"],["黄鹤断矶头，故人今在否？","旧江山浑是新愁。","欲买桂花同载酒，终不似，少年游。"]],"notes":[["带","映带、环绕"],["汀洲","水中小块陆地"],["南楼","武昌蛇山上的楼，作者旧游之地"],["黄鹤矶","武昌蛇山西北的江边石矶，黄鹤楼所在"],["浑是","全是、尽是"]],"background":["刘过（1154—1206），字改之，号龙洲道人，南宋词人。与辛弃疾交游甚密，词风豪放，属辛派重要代表。","范进中了举高兴到发疯，那刘过呢？其实答案就藏在两个词的区别里：<strong>中举</strong>和<strong>落第</strong>，对刘过来讲，根本不是一回事。范进一辈子困在秀才那一级，连乡试都过不了。秀才是科举的起点，有资格见县官不跪，但什么实利都没有，照样受穷挨饿挨骂。所以当他熬到五十四岁终于<strong>过了乡试</strong>、拿下举人，这一刻彻底逆转人生：能当官了、能免赋税了、乡绅来送房子送田了。这是从“底层爬上来”的绝境逆袭，不疯才奇怪。","刘过的情况刚好相反。他<strong>很早就拿到了举人的资格</strong>，所以能去临安参加礼部省试。但麻烦就麻烦在，他只能到这里为止。举人本身是有特权的——见官不跪、免部分赋税，可刘过想做的是<strong>进士</strong>。宋代官场极重出身，只有进士才是正途，举人做不了正经大官。而刘过的志向不是混个免税额，他想抗金北伐、整顿朝纲，甚至给皇帝上过奏疏。这类抱负，一个没有任何官职的举人根本施展不了。","所以他四次进临安考进士，四次被刷。他看着同辈的金榜题名、穿绿袍入仕途，自己永远是“强名举子”，不尴不尬地悬在半空。范进的喜，是<strong>终于摸到了门</strong>；刘过的悲，是<strong>门就在眼前，看了二十多年，硬是打不开</strong>。","此词作于武昌。词人二十年前曾登临南楼，如今故地重游，旧友凋零、山河破碎，少年意气早已消磨殆尽。「旧江山浑是新愁」——江山依旧，却满目新愁，表面怀旧，实则暗含对南宋偏安、国事日非的深沉忧愤。「四举无成，十年不调」——“四举”指的不是中举四次，是他以举人身份参加了四次进士考试，全部落榜。举人的身份他早就有了，可惜对他来说，这不过是一张永远来不及兑现的承兑票据。"]},{"title":"菩萨蛮 · 花明月暗笼轻雾","meta":"[南唐] 李煜","verses":[["花明月暗笼轻雾，","今宵好向郎边去。","刬袜步香阶，","手提金缕鞋。"],["画堂南畔见，","一向偎人颤。","奴为出来难，","教君恣意怜。"]],"notes":[["刬袜","只穿袜子，不穿鞋，形容蹑手蹑脚"],["画堂","彩绘装饰的厅堂"],["一向","一味地、尽情地"],["偎人颤","依偎在人身旁微微颤抖"],["奴","古代女子对自己的谦称"]],"background":["李煜（937—978），字重光，号钟隐、莲峰居士，南唐最后一位国君，世称李后主。精通书画音律，词作尤为一绝，被誉为<strong>千古词帝</strong>。王国维在《人间词话》中说：「词至李后主而眼界始大，感慨遂深，遂变伶工之词而为士大夫之词。」意思是词这种文体到了李煜手里才真正长大了，从歌女唱的小曲变成了有血有肉的文学。","这首词写的是一次深夜幽会。花色明艳、月色朦胧、薄雾弥漫——气氛已经替他交代了一切。女子提着鞋、踩着袜子偷偷溜过台阶，生怕发出声响。见到了心上人，扑过去就抖。最后一句「奴为出来难，教君恣意怜」——正因为她出来赴约冒了天大的险，所以你要好好疼我。没有一句写情，句句都是情。","词中的女主角一般认为是小周后——大周后的亲妹妹。大周后病重期间，李煜与小周后暗中往来，后来小周后继立为后。这段感情在当时就备受争议，但李煜偏偏把它写进词里，还写得如此大胆直白。別人写艳情躲躲闪闪，他写艳情坦坦荡荡，不遮掩、不美化、不矫饰——这就是李煜。他的词之所以好，不是因为他有多高的文学技巧，而是因为他<strong>根本不在乎技巧</strong>。他只是把自己当时感受到的东西原原本本写下来，真情实感本身就是最好的修辞。"]},{"title":"菊花新 · 欲掩香帏论缱绻","meta":"[宋] 柳永","verses":[["欲掩香帏论缱绻，","先敛双蛾愁夜短。","催促少年郎，","先去睡、鸳衾图暖。"],["须臾放了残针线，","脱罗裳、恣情无限。","留取帐前灯，","时时待、看伊娇面。"]],"notes":[["香帏","带有香气的帷帐"],["缱绻","缠绵亲密，形容情意深厚"],["敛双蛾","微微皱起双眉，蛾指蛾眉"],["鸳衾","绣着鸳鸯的锦被"],["罗裳","丝织的裙裳"],["伊","她"]],"background":["柳永（约984—约1053），原名三变，字耆卿，北宋词人。出身福建崇安的官宦之家，少年时才华横溢，二十来岁到了汴京，一头扎进坊巷勾栏，跟歌妓乐师混成一片。年轻时词就已经传遍大街小巷，相当于没毕业就已经是顶流。在他之前，词是文人酒宴上的即兴消遣；在他之后，词成了一种可以安身立命的营生。叶梦得说他是「凡有井水饮处，皆能歌柳词」——放到今天就是全国每一个有Wi-Fi的地方都在放他的歌。","他和歌妓的关系不是恩客与玩物，更像战友。他替她们写词，她们替他唱，互相养活着彼此。他的词里出现过很多具体的名字——虫娘、心娘、佳娘、酥娘，每个人都有自己的性格和故事。这首词写的就是这样一个寻常的夜晚：女子放下帷帐、皱着眉头嫌夜太短，催心上人先去被窝里暖着。然后放下手中没做完的针线，换下外衣，却特意留了一盏灯——不是为了照明，是为了能看清他的脸。「留取帐前灯，时时待、看伊娇面」，这一句是整首词的灵魂：什么都做了，却还舍不得灭灯，想多看他几眼。","「须臾放了残针线」——她在做针线活，不是弹琴唱曲的时候，说明这不是应酬的场合，是一个寻常的夜晚。她放下手里的活计就过来了，没有梳妆打扮，没有等他三请四邀。柳永的词里，歌妓从来不是道具，是<strong>一个具体的人</strong>——有手上的活要干，有心里的话要说，有放不下的一盏灯。","柳永写情有一个別人学不来的本事：<strong>他不写感觉，他写动作</strong>。別人写相思，写「此情无计可消除」；柳永写相思，写女子放下针线、脱下罗裳、把灯拨亮。全是手上的活、眼里的活，没有一个字在抒情，但每一个动作都在说——我等这一夜，等了好久了。"]},{"title":"更漏子 · 玉炉香","meta":"[唐] 温庭筠","verses":[["玉炉香，红蜡泪，","偏照画堂秋思。","眉翠薄，鬓云残，","夜长衾枕寒。"],["梧桐树，三更雨，","不道离情正苦。","一叶叶，一声声，","空阶滴到明。"]],"notes":[["画堂","彩绘装饰的厅堂"],["眉翠薄","眉上的翠黛已斑驳脱落"],["鬓云残","如云的鬓发已散乱"],["不道","不顾、不管"]],"background":["温庭筠（约812—约870），本名岐，字飞卿，晚唐词人。出身太原温氏，祖上是唐朝开国功臣，但到他这代家道已经中落。脑子极好使，据说叉手八次就能写完一首诗，人称<strong>温八叉</strong>。可脑子再好使也架不住一件事——考不上。","他不是考一次两次，是考了一辈子。最出名的一次，主考官沈询知道他才高，特意把他安排在眼皮底下坐着，防他帮别人代写。结果温庭筠当场帮<strong>八个人</strong>写了卷子，被人举报，直接上了黑名单，从此考官见他绕道走。科举这条路就算堵死了。后来好不容易托关系得了一个随县县尉——一个县里的治安官，九品都不一定够——没过多久还被贬了。","仕途走不通，他就一头扎进长安的歌舞坊巷，跟歌妓乐师混在一起，替她们写词、填曲子。一个士族子弟天天泡在歌楼里，等于自绝于正经社会。但他的词写得太好了，歌女们抢着唱，相当于唐代的金牌作词人。后来赵崇祚编《花间集》，温庭筠一个人占了六十六首，全书第一人，<strong>花间派的鼻祖</strong>就此立住了。","这首词写的就是他在坊巷里见惯了的场景：一个失眠的秋夜。香炉燃着、蜡烛流着泪，偏偏来照一个满心秋思的人。「偏照」两个字极妙——烛光又不是故意的，可落在这个辗转难眠的人身上，就成了一种残忍。眉妆花了、头发乱了，被窝里冰冰冷冷，一夜长得没有尽头。下片镜头切到窗外：梧桐叶上三更的秋雨，不管屋里的离愁有多苦，该怎么下还怎么下。「一叶叶，一声声，空阶滴到明」——<strong>它什么都没说</strong>。没有「我好苦」，没有「我恨你」，只有一个声音从三更滴到天亮。那个听雨听到天明的人，到底是她，还是他自己？温庭筠不会说的。但你看那个「空阶」——空的不只是台阶，是整个夜晚都没有人来过。"]},{"title":"思帝乡 · 春日游","meta":"[唐] 韦庄","verses":[["春日游，杏花吹满头。","陌上谁家年少，足风流。"],["妾拟将身嫁与，一生休。","纵被无情弃，不能羞。"]],"notes":[["陌上","田间小路上"],["足风流","十分潇洒俊逸"],["妾","古代女子自称"],["一生休","这一生也就够了"],["不能羞","也不会觉得羞悔"]],"background":["韦庄（约836—910），字端己，晚唐五代词人，与温庭筠并称<strong>温韦</strong>，同为花间派代表。但两人风格截然不同：温庭筠是精雕细琢的工笔画，韦庄是直来直去的大写意。温词像在远处看一幅屏风，美是美，但你摸不到；韦词像对面坐着一个人在跟你说话，你听得见她的呼吸。","这首词写的是一个少女春日出游，陌上撞见一个风流少年，一眼就定了终身。「杏花吹满头」——花瓣落了满头，她还浑然不觉，因为全部注意力都被那个人吸走了。「妾拟将身嫁与，一生休」——我想嫁给他，这辈子就够了。最后一句才是真正的炸裂：「纵被无情弃，不能羞」——<strong>就算他将来抛弃我，我也不后悔</strong>。这四个字是整首词的命门。她不是没想过最坏的结果，她想过了，想过了还是选他。这不是天真，是清醒地赌上了一切。","韦庄写这首词时，多半想起了自己在战乱中离散的爱人。黄巢起义时，韦庄的妹妹在战乱中被掳走，从此杳无音讯。他后来辗转蜀地，辅佐王建建立前蜀，官至宰相，看起来风光，但一辈子都在漂泊中度过。这首词里那个奋不顾身的少女，也许就是他心里那段<strong>再也回不去的春天</strong>——他多想也有那样一次孤注一掷的机会，不管结局如何，至少曾经把一切都交出去了。韦庄和温庭筠的区别就在这里：温庭筠写的是别人的故事，隔着一层纱；韦庄写的<strong>永远是他自己</strong>，只是换了一副面孔。"]},{"title":"雨霖铃 · 寒蝉凄切","meta":"[宋] 柳永","verses":[["寒蝉凄切，对长亭晚，骤雨初歇。","都门帐饮无绪，留恋处，兰舟催发。","执手相看泪眼，竟无语凝噎。","念去去，千里烟波，暮霭沉沉楚天阔。"],["多情自古伤离别，更那堪，冷落清秋节！","今宵酒醒何处？杨柳岸，晓风残月。","此去经年，应是良辰好景虚设。","便纵有千种风情，更与何人说？"]],"notes":[["长亭","古代驿道上供行人休息的亭子，也是送别之地"],["都门帐饮","在京城门外设帐饯别"],["兰舟","用木兰木造的船，船的美称"],["凝噎","喉咙哽住，说不出话"],["暮霭","傍晚的云雾"],["经年","年复一年"]],"background":["这首词是柳永最著名的作品，也是宋词里写离别的天花板。要读懂这首词，得先知道柳永是怎么被皇帝亲手毁掉前程的。他参加科举本来考上了，结果宋仁宗看到名单上他的名字，想起他那首《鹤冲天》里写了句「忍把浮名，换了浅斟低唱」——功名利禄算个屁，不如喝酒听歌。仁宗大笔一挥把他的名字划掉，甩了一句：<strong>「且去浅斟低唱，何要浮名。」</strong>你不是爱喝酒唱歌吗？去吧，官不用做了。柳永后来干脆自称「奉旨填词柳三变」，把皇帝的嘲讽当招牌挂了出来。快五十岁时赶上恩科才终于考上进士，考上了又怎样——官场根本不待见他，最高做到屯田员外郎，一个从六品的闲职。","回到这首词。「执手相看泪眼，竟无语凝噎」——两个人手拉着手，泪眼相对，一句话也说不出。下片的「今宵酒醒何处？杨柳岸，晓风残月」更是千古名句：酒醒之后发现自己孤零零地漂在江上，岸边是柳树、头顶是残月、迎面是晨风——一切都还在，唯独身边那个人不在了。","词中的女主人翁，一般认为是虫娘。虫娘是柳永在汴京最钟爱的一位歌妓，柳永的词里多次出现她的名字：「就中堪人属意，最是虫虫」「小楼深巷狂游遍，惯得虫娘柔且软」。虫娘不像別的歌妓那样逢场作戏，她对柳永是动了真心的。可柳永要离京远行，一个没有功名的落拓文人，一个身不由己的歌妓，<strong>谁也留不住谁</strong>。「便纵有千种风情，更与何人说」——这话说的是离别，也是他们两个人的命。","约1053年，柳永死在润州，穷得连丧事都办不起。最后是汴京的歌女们凑钱把他葬了。此后每年清明节，歌女们都会去他坟前祭拜，这个习俗叫<strong>「吊柳七」</strong>——柳七是他在坊巷里的排行。一个被皇帝抛弃的人，被一群「下等人」记了一辈子。这首词之所以能打动一千年来所有读过它的人，不是因为文采有多华美——恰恰相反，整首词<strong>没有一个生僻字</strong>，全是大白话。柳永的词不靠学问取胜，靠的是他真的经历过那些事、真的舍不得那个人。你不用读懂宋词的格律，你只要分过一次手，就读懂了这首词。"]},{"title":"菩萨蛮 · 小山重叠金明灭","meta":"[唐] 温庭筠","verses":[["小山重叠金明灭，","鬓云欲度香腮雪。","懒起画蛾眉，","弄妆梳洗迟。"],["照花前后镜，","花面交相映。","新帖绣罗襦，","双双金鹧鸪。"]],"notes":[["小山","屏风上画的重叠山峦，一说指眉妆的形状"],["金明灭","晨光照在屏风金饰上忽明忽暗"],["鬓云","如云的鬓发松散垂下"],["香腮雪","白皙的面颊"],["蛾眉","如蚕蛾触须般细长弯曲的眉毛"],["罗襦","丝织的短上衣"],["金鹧鸪","金线绣成的鹧鸪鸟"]],"background":["温庭筠有个外号叫<strong>温钟馗</strong>——因为他长得丑，像钟馗。才华和颜值严重不匹配：脑子叉手八次成诗，脸却让人不忍直视。但偏偏这样一个人，写出了全唐最精致、最秾丽的女子词。","他和女性之间最有名的一段渊源，是鱼玄机。鱼玄机原名鱼幼薇，是个天才少女，温庭筠看中了她的才华，收她做学生。后来鱼幼薇嫁给补阙李亿做妾，被正妻赶出家门，出家当了道士，改名鱼玄机。温庭筠和她之间到底是纯粹的师生，还是别的什么，历来众说纷纭，没有定论。但可以确定的是，温庭筠一生中最亲近的女性，不是什么名门闺秀，全是坊巷歌楼里的歌妓和像鱼幼薇这样被命运推到边缘的女子。","这首词是温庭筠的代表作，也是《花间集》的开卷第一首——整部花间词的序幕，就是从这间闺房拉开的。全词没有一句心理描写，全靠画面推进：屏风上的金光在闪烁、头发散落在白皙的脸颊上、懒得起床、慢慢画眉、对镜簪花、换上新绣的衣服——衣服上绣着一对对金鹧鸪。读到最后一句才知道上当了一整首。「双双金鹧鸪」——衣服上绣的是<strong>成双成对</strong>的鸟，可穿上这件衣服的人独处一室。前面所有慵懒的、迟缓的、心不在焉的动作，在这个「双双」面前全部倒灌回来：她不是懒，是梳妆给谁看？温庭筠花了一整首词铺陈一个女子精致的晨妆，到最后一刀切开——<strong>她打扮得这么美，却没有人在看</strong>。","这首词真正厉害的地方在于，<strong>它超越了任何一个具体的人</strong>。凡是在华美的房间里独处过、精心打扮过却无处可去的人，读到这首词都会被击中。温庭筠的词表面写的是唐代歌妓的早晨，骨子里写的是一种亘古不变的孤独——越精致，越空荡。王国维评价温词「句秀也」，意思是他的句子本身就很美。但这首词的美不在句子，在那个反差：<strong>满屋子的锦绣繁华，抵不过一只绣上去的假鸟</strong>。"]}];</script>
