<script>window.poemData = [{"title":"唐多令 · 芦叶满汀州","meta":"[宋] 刘过","verses":[["芦叶满汀洲，寒沙带浅流。","二十年重过南楼。","柳下系船犹未稳，能几日，又中秋。"],["黄鹤断矶头，故人今在否？","旧江山浑是新愁。","欲买桂花同载酒，终不似，少年游。"]],"notes":[["带","映带、环绕"],["汀洲","水中小块陆地"],["南楼","武昌蛇山上的楼，作者旧游之地"],["黄鹤矶","武昌蛇山西北的江边石矶，黄鹤楼所在"],["浑是","全是、尽是"]],"background":["刘过（1154—1206），字改之，号龙洲道人，南宋词人。与辛弃疾交游甚密，词风豪放，属辛派重要代表。","范进中了举高兴到发疯，那刘过呢？其实答案就藏在两个词的区别里：<strong>中举</strong>和<strong>落第</strong>，对刘过来讲，根本不是一回事。范进一辈子困在秀才那一级，连乡试都过不了。秀才是科举的起点，有资格见县官不跪，但什么实利都没有，照样受穷挨饿挨骂。所以当他熬到五十四岁终于<strong>过了乡试</strong>、拿下举人，这一刻彻底逆转人生：能当官了、能免赋税了、乡绅来送房子送田了。这是从“底层爬上来”的绝境逆袭，不疯才奇怪。","刘过的情况刚好相反。他<strong>很早就拿到了举人的资格</strong>，所以能去临安参加礼部省试。但麻烦就麻烦在，他只能到这里为止。举人本身是有特权的——见官不跪、免部分赋税，可刘过想做的是<strong>进士</strong>。宋代官场极重出身，只有进士才是正途，举人做不了正经大官。而刘过的志向不是混个免税额，他想抗金北伐、整顿朝纲，甚至给皇帝上过奏疏。这类抱负，一个没有任何官职的举人根本施展不了。","所以他四次进临安考进士，四次被刷。他看着同辈的金榜题名、穿绿袍入仕途，自己永远是“强名举子”，不尴不尬地悬在半空。范进的喜，是<strong>终于摸到了门</strong>；刘过的悲，是<strong>门就在眼前，看了二十多年，硬是打不开</strong>。","此词作于武昌。词人二十年前曾登临南楼，如今故地重游，旧友凋零、山河破碎，少年意气早已消磨殆尽。「旧江山浑是新愁」——江山依旧，却满目新愁，表面怀旧，实则暗含对南宋偏安、国事日非的深沉忧愤。「四举无成，十年不调」——“四举”指的不是中举四次，是他以举人身份参加了四次进士考试，全部落榜。举人的身份他早就有了，可惜对他来说，这不过是一张永远来不及兑现的承兑票据。"]},{"title":"菩萨蛮 · 花明月暗笼轻雾","meta":"[南唐] 李煜","verses":[["花明月暗笼轻雾，","今宵好向郎边去。","刬袜步香阶，","手提金缕鞋。"],["画堂南畔见，","一向偎人颤。","奴为出来难，","教君恣意怜。"]],"notes":[["刬袜","只穿袜子，不穿鞋，形容蹑手蹑脚"],["画堂","彩绘装饰的厅堂"],["一向","一味地、尽情地"],["偎人颤","依偎在人身旁微微颤抖"],["奴","古代女子对自己的谦称"]],"background":["李煜（937—978），字重光，号钟隐、莲峰居士，南唐最后一位国君，世称李后主。精通书画音律，词作尤为一绝，被誉为<strong>千古词帝</strong>。王国维在《人间词话》中说：「词至李后主而眼界始大，感慨遂深，遂变伶工之词而为士大夫之词。」意思是词这种文体到了李煜手里才真正长大了，从歌女唱的小曲变成了有血有肉的文学。","这首词写的是一次深夜幽会。花色明艳、月色朦胧、薄雾弥漫——气氛已经替他交代了一切。女子提着鞋、踩着袜子偷偷溜过台阶，生怕发出声响。见到了心上人，扑过去就抖。最后一句「奴为出来难，教君恣意怜」——正因为她出来赴约冒了天大的险，所以你要好好疼我。没有一句写情，句句都是情。","词中的女主角一般认为是小周后——大周后的亲妹妹。大周后病重期间，李煜与小周后暗中往来，后来小周后继立为后。这段感情在当时就备受争议，但李煜偏偏把它写进词里，还写得如此大胆直白。別人写艳情躲躲闪闪，他写艳情坦坦荡荡，不遮掩、不美化、不矫饰——这就是李煜。他的词之所以好，不是因为他有多高的文学技巧，而是因为他<strong>根本不在乎技巧</strong>。他只是把自己当时感受到的东西原原本本写下来，真情实感本身就是最好的修辞。"]}];</script>
