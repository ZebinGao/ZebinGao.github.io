# Metadata elements 这是一种对 Hexo 开发团队的“致敬”。
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 20
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: Zebin-Theme

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy: 
  type: git
  repo: git@github.com:ZebinGao/ZebinGao.github.io.git
  branch: main
  
#blog back 
backup:
  type: git 
  theme: material-x-1.2.1
  message: this is my blog backup 
  repository: 
    github: git@github.com:ZebinGao/ZebinGao.github.io.git,
    
#确保全局配置存在，给插件用
search:
  path: search.xml
  field: post
  content: true
  format: html
  #limit: 10000 是一个安全阀，用来限制搜索数据库抓取的文章数量上限。
  limit: 10000

# 归档页生成配置
archive_generator:
  per_page: 30   # 🎯 每页 30 篇
  yearly: true  # 开启按年归档
  monthly: true # 开启按月归档

# 文章加密
encrypt:
  message: "本文已加密，请输入密码查看。"
  wrong_pass_message: "密码错误，请重试。"
  kdf:
    iterations: 600000

# RSS 订阅
feed:
  type: atom
  path: atom.xml
  limit: 10