    <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const htmlElement = document.documentElement;

    const currentTheme = localStorage.getItem('theme');

    if (currentTheme === 'dark') {
        htmlElement.setAttribute('data-theme', 'dark');
        themeIcon.innerText = '☀️'; // 变成了太阳
    }

    toggleBtn.addEventListener('click', () => {
        let theme = htmlElement.getAttribute('data-theme');
        
        if (theme === 'dark') {
            htmlElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeIcon.innerText = '🌙'; // 变回月亮
        } else {
            htmlElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeIcon.innerText = '☀️'; // 变成太阳
        }
    });

    function buildCalendar() {
        const grid = document.getElementById('calendar-grid');
        const monthHeader = document.getElementById('calendar-month'); // 🎯 获取标题元素
        if (!grid || !monthHeader) return;
        
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const today = now.getDate();
        
        // 🎯 动态写入当前的月份和年份
        const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
        monthHeader.innerText = `${monthNames[month]} ${year}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        grid.innerHTML = ''; // 清空旧数据
        
        // 填充空白
        for (let i = 0; i < firstDay; i++) {
            grid.innerHTML += '<span></span>';
        }
        
        // 填充日期
        for (let d = 1; d <= daysInMonth; d++) {
            const isToday = d === today ? 'class="today"' : '';
            grid.innerHTML += `<span ${isToday}>${d}</span>`;
        }
    }
    buildCalendar();

    // 搜索功能
    (function() {
        var searchInput = document.getElementById('search-input');
        var searchResults = document.getElementById('search-results');
        var searchData = null;

        function loadSearchData(callback) {
            if (searchData) { callback(); return; }
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/search.xml', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var parser = new DOMParser();
                    var xml = parser.parseFromString(xhr.responseText, 'text/xml');
                    searchData = xml.querySelectorAll('entry');
                    callback();
                }
            };
            xhr.send();
        }

        searchInput.addEventListener('input', function() {
            var query = this.value.trim().toLowerCase();
            if (!query) { searchResults.innerHTML = ''; return; }

            loadSearchData(function() {
                var html = '';
                var count = 0;
                searchData.forEach(function(entry) {
                    var title = entry.querySelector('title').textContent.toLowerCase();
                    var content = entry.querySelector('content').textContent.toLowerCase();
                    if (title.indexOf(query) > -1 || content.indexOf(query) > -1) {
                        var url = entry.querySelector('url').textContent;
                        var displayTitle = entry.querySelector('title').textContent;
                        html += '<a class="search-result-item" href="' + url + '">' + displayTitle + '</a>';
                        count++;
                        if (count >= 8) return;
                    }
                });
                searchResults.innerHTML = html || '<div class="search-no-result">未找到相关文章</div>';
            });
        });

        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.innerHTML = '';
            }
        });
    })();

    // 移动端汉堡菜单
    (function() {

        var overlay = document.getElementById('mobile-overlay');
        var sidebar = document.querySelector('.sidebar-left');
        var menuLinks = sidebar ? sidebar.querySelectorAll('.site-nav a') : [];

        function openMenu() {
            sidebar.classList.add('open');
            overlay.classList.add('open');
        }
        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }

        hamburger.addEventListener('click', function() {
            if (sidebar.classList.contains('open')) { closeMenu(); }
            else { openMenu(); }
        });

        overlay.addEventListener('click', closeMenu);

        menuLinks.forEach(function(link) {
            link.addEventListener('click', closeMenu);
        });
    })();

        var langBtns = document.querySelectorAll('.lang-btn');
        var defaultLang = 'de';
        var currentLang = localStorage.getItem('lang') || defaultLang;

        function updateLangButtons(lang) {
            langBtns.forEach(function(btn) {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function applyLang(lang) {
            var t = translations[lang];
            // data-i18n text
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                if (!el.getAttribute('data-original')) {
                    el.setAttribute('data-original', el.textContent.trim());
                }
                if (t[key]) {
                    el.textContent = t[key];
                } else {
                    el.textContent = el.getAttribute('data-original');
                }
            });
            // data-i18n-placeholder
            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
                var key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
            // data-i18n-cat (category/tag translations)
            document.querySelectorAll('[data-i18n-cat]').forEach(function(el) {
                var zhName = el.getAttribute('data-i18n-cat');
                if (!el.getAttribute('data-original')) {
                    el.setAttribute('data-original', el.textContent.trim());
                }
                if (lang === 'en' && t.cat && t.cat[zhName] !== undefined) {
                    el.textContent = t.cat[zhName];
                } else {
                    el.textContent = el.getAttribute('data-original');
                }
            });
            // Archive month suffix
            document.querySelectorAll('.month-suffix').forEach(function(el) {
                el.textContent = t.month_suffix !== undefined ? t.month_suffix : ' 月';
            });
            // Paginator prev/next text
            document.querySelectorAll('.paginator a').forEach(function(a) {
                if (a.textContent.indexOf('上一页') > -1) a.innerHTML = '&laquo; ' + t.prev_page;
                if (a.textContent.indexOf('下一页') > -1) a.innerHTML = t.next_page + ' &raquo;';
            });
            // Page title (post-title from front matter)
            var pageTitle = document.querySelector('.post-title');
            if (pageTitle) {
                if (!pageTitle.getAttribute('data-original')) {
                    pageTitle.setAttribute('data-original', pageTitle.textContent.trim());
                }
                var orig = pageTitle.getAttribute('data-original');
                if (lang === 'en') {
                    if (t.menu && t.menu[orig] !== undefined) {
                        pageTitle.textContent = t.menu[orig];
                    } else if (orig === 'about') {
                        pageTitle.textContent = 'About';
                    }
                } else {
                    pageTitle.textContent = orig;
                }
            }
            // Navigation menu
            document.querySelectorAll('.site-nav a').forEach(function(a) {
                var spans = a.querySelectorAll('span');
                var textNode = spans.length > 0 ? spans[0].nextSibling : a.childNodes[1];
                if (!a.getAttribute('data-original')) {
                    a.setAttribute('data-original', textNode ? textNode.textContent.trim() : '');
                }
                var orig = a.getAttribute('data-original');
                if (lang === 'en' && t.menu && t.menu[orig] !== undefined) {
                    if (textNode) textNode.textContent = t.menu[orig];
                } else {
                    if (textNode) textNode.textContent = orig;
                }
            });
            // Update lang buttons
            updateLangButtons(lang);
            // Rebuild calendar
            buildCalendarLang(lang, t);
        }

        window.buildCalendarLang = function(lang, t) {
            var grid = document.getElementById('calendar-grid');
            var monthHeader = document.getElementById('calendar-month');
            if (!grid || !monthHeader) return;
            var now = new Date();
            var year = now.getFullYear();
            var month = now.getMonth();
            var today = now.getDate();
            monthHeader.innerText = t.months[month] + ' ' + year;
            var firstDay = new Date(year, month, 1).getDay();
            var daysInMonth = new Date(year, month + 1, 0).getDate();
            grid.innerHTML = '';
            for (var i = 0; i < firstDay; i++) grid.innerHTML += '<span></span>';
            for (var d = 1; d <= daysInMonth; d++) {
                grid.innerHTML += '<span' + (d === today ? ' class="today"' : '') + '>' + d + '</span>';
            }
            // Day headers
            var dayRow = document.querySelector('.calendar-days');
            if (dayRow) {
                dayRow.innerHTML = t.days.map(function(d){ return '<span>' + d + '</span>'; }).join('');
            }
        };

        // Override no-result text
        var origNoResult = '未找到相关文章';

        langBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                currentLang = btn.getAttribute('data-lang');
                localStorage.setItem('lang', currentLang);
                applyLang(currentLang);
            });
        });

        // Apply saved lang on load
        if (currentLang !== 'zh') applyLang(currentLang);
        updateLangButtons(currentLang);
    })();
